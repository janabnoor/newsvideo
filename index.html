<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b120a">
<title>NCM Bulletin — Digital Flipbook</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/flipbook.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<div id="stage" class="stage">

  <!-- Ambient backdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-glow"></div>
    <div class="backdrop-vignette"></div>
  </div>

  <!-- Loading state -->
  <div id="loader" class="loader" role="status" aria-live="polite">
    <div class="loader-book">
      <div class="loader-page loader-page--1"></div>
      <div class="loader-page loader-page--2"></div>
      <div class="loader-page loader-page--3"></div>
    </div>
    <p class="loader-text">Opening publication<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span></p>
    <div class="loader-progress">
      <div id="loaderBar" class="loader-progress-fill"></div>
    </div>
  </div>

  <!-- Main viewer -->
  <div id="viewer" class="viewer" aria-label="PDF flipbook viewer">

    <div id="bookWrapper" class="book-wrapper">
      <div id="book" class="book" role="group" aria-roledescription="flipbook">
        <!-- Flipbook pages injected by JS -->
      </div>
      <div id="bookShadow" class="book-shadow" aria-hidden="true"></div>
    </div>

  </div>

  <!-- Navigation arrows -->
  <button id="prevBtn" class="nav-arrow nav-arrow--prev" aria-label="Previous page" type="button">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M15 4L7 12L15 20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button id="nextBtn" class="nav-arrow nav-arrow--next" aria-label="Next page" type="button">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M9 4L17 12L9 20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Minimal floating control rail (bottom, auto-hides) -->
  <div id="controlRail" class="control-rail" role="toolbar" aria-label="Reader controls">
    <button id="zoomOutBtn" class="rail-btn" aria-label="Zoom out" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <span id="zoomLabel" class="rail-label">100%</span>
    <button id="zoomInBtn" class="rail-btn" aria-label="Zoom in" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="rail-divider" aria-hidden="true"></div>
    <button id="soundBtn" class="rail-btn" aria-label="Mute sound" type="button" aria-pressed="false">
      <svg id="soundIconOn" viewBox="0 0 24 24" fill="none"><path d="M5 9v6h4l5 5V4L9 9H5z" fill="currentColor"/><path d="M16.5 8.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <svg id="soundIconOff" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M5 9v6h4l5 5V4L9 9H5z" fill="currentColor"/><path d="M16 9l5 6M21 9l-5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="rail-divider" aria-hidden="true"></div>
    <span id="pageIndicator" class="rail-page-indicator">1 / 1</span>
    <div class="rail-divider" aria-hidden="true"></div>
    <button id="fullscreenBtn" class="rail-btn" aria-label="Toggle fullscreen" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- Screen-reader live region for page changes -->
  <div id="srStatus" class="sr-only" role="status" aria-live="polite"></div>

</div>

<script src="libraries/pdfjs/build/pdf.min.mjs" type="module"></script>
<script type="module" src="js/pdf-renderer.js"></script>
<script type="module" src="js/lazy-loader.js"></script>
<script type="module" src="js/zoom-controls.js"></script>
<script type="module" src="js/sound-engine.js"></script>
<script type="module" src="js/touch-controls.js"></script>
<script type="module" src="js/flip-engine.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
